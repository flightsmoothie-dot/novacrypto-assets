<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Pomodoro Timer — 25/5 Focus Timer Online</title>
<meta name="description" content="Free online Pomodoro timer. 25 minutes work, 5 minutes break. No signup, no ads. Just focus.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.timer{text-align:center;margin-bottom:40px}
.time{font-size:120px;font-weight:200;font-family:'Courier New',monospace;color:#fff;margin:20px 0}
.label{font-size:18px;color:#a78bfa;text-transform:uppercase;letter-spacing:3px}
.controls{display:flex;gap:16px;margin-top:20px}
.btn{padding:14px 32px;border-radius:8px;border:none;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
.btn-start{background:#a78bfa;color:#1a1a2e}
.btn-reset{background:#333;color:#aaa;border:1px solid#444}
.btn:hover{transform:scale(1.05)}
.sidebar{position:fixed;right:20px;top:50%;transform:translateY(-50%);background:#16213e;border:1px solid#333;border-radius:12px;padding:20px;max-width:220px}
.sidebar h3{font-size:13px;color:#a78bfa;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.sidebar a{display:block;color:#888;text-decoration:none;font-size:13px;padding:6px 0;border-bottom:1px solid#222}
.sidebar a:hover{color:#a78bfa}
.sidebar .price{color:#a78bfa;font-weight:700;font-size:12px}
h1{font-size:24px;margin-bottom:10px}
@media(max-width:768px){.sidebar{position:static;transform:none;margin-top:40px;max-width:100%}}
</style>
</head>
<body>
<div class="timer">
<h1>Pomodoro Timer</h1>
<div class="label" id="phase">FOCUS</div>
<div class="time" id="time">25:00</div>
<div class="controls">
<button class="btn btn-start" id="startBtn" onclick="toggleTimer()">Start</button>
<button class="btn btn-reset" onclick="resetTimer()">Reset</button>
</div>
<p style="margin-top:20px;color:#666;font-size:13px">Sessions completed: <span id="count">0</span></p>
</div>

<div class="sidebar">
<h3>Productivity Tools</h3>
<a href="https://novacryptolabs.gumroad.com/l/gbuxqh">Weekly Planner 2026<br><span class="price">$4.99 — 52 pages</span></a>
<a href="https://novacryptolabs.gumroad.com/l/zfdnt">Habit Tracker 2026<br><span class="price">$3.99 — 12 months</span></a>
<a href="https://novacryptolabs.gumroad.com/l/msbty">Gratitude Journal<br><span class="price">$5.99 — 90 days</span></a>
<a href="https://novacryptolabs.gumroad.com/l/ecoaue">Budget Tracker<br><span class="price">$3.99 — 12 months</span></a>
<a href="https://flightsmoothie-dot.github.io/novacrypto-assets/repurpose-ai/">RepurposeAI<br><span class="price">FREE tool</span></a>
</div>

<script>
let timeLeft=25*60,running=false,interval,isWork=true,sessions=0;
function toggleTimer(){
if(running){clearInterval(interval);running=false;document.getElementById('startBtn').textContent='Start'}
else{running=true;document.getElementById('startBtn').textContent='Pause';
interval=setInterval(()=>{timeLeft--;
if(timeLeft<=0){clearInterval(interval);running=false;
if(isWork){sessions++;document.getElementById('count').textContent=sessions;timeLeft=5*60;isWork=false;document.getElementById('phase').textContent='BREAK';document.getElementById('startBtn').textContent='Start Break'}
else{timeLeft=25*60;isWork=true;document.getElementById('phase').textContent='FOCUS';document.getElementById('startBtn').textContent='Start'}
new Audio('data:audio/wav;base64,UklGRl9vT19teleQBAABAAEARKwAAIhYAQACABAAZGF0').play().catch(()=>{});
}updateDisplay()},1000)}}
function resetTimer(){clearInterval(interval);running=false;timeLeft=25*60;isWork=true;document.getElementById('phase').textContent='FOCUS';document.getElementById('startBtn').textContent='Start';updateDisplay()}
function updateDisplay(){let m=Math.floor(timeLeft/60),s=timeLeft%60;document.getElementById('time').textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`}
</script>
</body>
</html>
